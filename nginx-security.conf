# ============================================================
# 深圳市天成测绘技术有限公司 — Nginx 安全配置
# 部署时复制到 /etc/nginx/sites-available/ 或 nginx.conf
# ============================================================

# === 反爬虫：限流 ===
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:20m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

server {
    listen 80;
    server_name www.sztcch.com.cn sztcch.com.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.sztcch.com.cn sztcch.com.cn;

    root /var/www/tiancheng-survey;
    index index.html;

    # === 安全头 ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === 反爬虫：连接限制 ===
    limit_conn connlimit 20;
    limit_req zone=static burst=50 nodelay;

    # === 屏蔽恶意 User-Agent ===
    if ($http_user_agent ~* (MJ12bot|AhrefsBot|SemrushBot|DotBot|Bytespider|PetalBot|YisouSpider|scrapy|curl|wget|python-requests)) {
        return 403;
    }

    # === 阻止直接访问图片目录 ===
    location ~ ^/images/(certificates|brochure|work)/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # === 阻止访问敏感文件 ===
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # === SPA 路由：所有路径返回 index.html ===
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # === 静态资源缓存 ===
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # === 证书图片禁止外链 ===
    location /images/certificates/ {
        valid_referers none blocked www.sztcch.com.cn sztcch.com.cn;
        if ($invalid_referer) {
            return 403;
        }
    }

    # === Gzip 压缩 ===
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
